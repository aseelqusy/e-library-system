<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Book Club</title>
  <desc id="desc">Illustration of books stacked for a book club event.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="40" fill="url(#bg)"/>
  <circle cx="620" cy="140" r="100" fill="#f0fdfa" opacity="0.18"/>
  <circle cx="150" cy="120" r="70" fill="#fff" opacity="0.14"/>
  <g transform="translate(150 175)">
    <rect x="40" y="260" width="430" height="42" rx="18" fill="#134e4a" opacity="0.35"/>
    <rect x="80" y="210" width="360" height="42" rx="18" fill="#f8fafc" opacity="0.95"/>
    <rect x="60" y="155" width="390" height="42" rx="18" fill="#fb7185"/>
    <rect x="110" y="100" width="320" height="42" rx="18" fill="#f59e0b"/>
    <rect x="150" y="45" width="280" height="42" rx="18" fill="#60a5fa"/>
    <rect x="150" y="45" width="72" height="42" rx="18" fill="#1d4ed8" opacity="0.5"/>
    <rect x="110" y="100" width="58" height="42" rx="18" fill="#b45309" opacity="0.45"/>
    <rect x="60" y="155" width="66" height="42" rx="18" fill="#be123c" opacity="0.45"/>
  </g>
  <text x="60" y="90" fill="#fff" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">Storytelling Workshop</text>
</svg>

